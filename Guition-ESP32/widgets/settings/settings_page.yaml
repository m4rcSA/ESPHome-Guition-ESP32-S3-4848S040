# settings_page.yaml
# ─────────────────────────────────────────────────────────────────────────────
# LVGL settings page: Language, Theme, Backlight, Sleep mode, Clock, Temp unit.
# Also defines the display idle / auto-sleep handler.
# Included automatically by settings.yaml — do not include directly.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  settings_language_label:            "Language"
  settings_theme_label:               "Theme"
  settings_backlight_label:           "Backlight"
  settings_sleep_label:               "Sleep mode (sec)"
  settings_clock_label:               "Clock"
  settings_clock_12h_label:           "12h"
  settings_clock_24h_label:           "24h"
  settings_temperature_label:         "Temperature"
  settings_screensaver_label:         "Screensaver"
  settings_screensaver_digital_label: "Digital"
  settings_flip_label:                "Flip"
  settings_screensaver_none_label:    "None"
  settings_show_calendar_label:       "Show calendar events"
  settings_home_clock_label:          "Home Clock"
  settings_home_clock_standard_label: "Standard"

lvgl:

  # ── Auto-sleep on idle ────────────────────────────────────────────────────
  on_idle:
    timeout: !lambda "return (id(display_timeout_number).state * 1000);"
    then:
      - logger.log: "LVGL idle — showing screensaver"
      - globals.set:
          id: screensaver_active
          value: 'true'
      - lvgl.widget.hide: menu_controls_main
      # Use raw LVGL API to show only screensaver_widget itself — ESPHome's
      # lvgl.widget.show recursively un-hides all children in LVGL 9, which
      # defeats the per-child show/hide logic in screensaver_update.
      - lambda: lv_obj_clear_flag(id(screensaver_widget), LV_OBJ_FLAG_HIDDEN);
      - script.execute: screensaver_update
      - if:
          condition:
            lambda: 'return id(screensaver_style) == 2;'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: 1%
          else:
            # Fixed 60% — visible day and night without the clock being unreadable.
            - light.turn_on:
                id: display_backlight
                brightness: 60%

  pages:
    - id: settings_page
      bg_color: color_slate_blue_gray
      widgets:

        # ── Scrollable area — ends above the nav bar (menu bar top ≈ y 380) ──
        - obj:
            id: settings_scroll_area
            x: 0
            y: 0
            width: 480
            height: 375
            pad_left: 0
            pad_right: 0
            pad_top: 0
            pad_bottom: 20
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            scrollbar_mode: ACTIVE
            widgets:

              # ── Language ───────────────────────────────────────────────────
              - obj:
                  id: language_bg
                  x: 20
                  y: 20
                  width: 440
                  height: 80
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:

                    - label:
                        id: language_label
                        x: 20
                        align: LEFT_MID
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_language_label}"

                    - image:
                        id: flag_language_image
                        x: 160
                        align: LEFT_MID
                        src: !lambda return id(flag_icon_mapping_image)[id(current_language)];

                    - dropdown:
                        id: language_dropdown
                        x: 240
                        width: 200
                        align: LEFT_MID
                        options:
                          - Deutsch         # de
                          - Español         # es
                          - Français        # fr
                          - English (GB)    # en-GB
                          - Italiano        # it
                          - Português       # pt
                          - Русский         # ru
                          - English (US)    # en
                          - Polski          # pl
                          - Catalá          # ca
                        bg_opa: TRANSP
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        border_width: 0
                        text_font: nunito_20
                        text_color: color_misty_blue
                        dropdown_list:
                          bg_color: color_slate_blue_gray
                          shadow_opa: TRANSP
                          border_color: color_misty_blue
                          border_width: 2
                          text_font: nunito_20
                          text_color: color_misty_blue
                          text_line_space: 7
                          pad_all: 8
                          max_height: 280
                          selected:
                            checked:
                              bg_color: color_steel_blue
                              bg_opa: 20%
                              text_color: color_misty_blue
                            pressed:
                              bg_opa: TRANSP
                              text_color: color_misty_blue
                        indicator:
                          text_opa: TRANSP
                        on_value:
                          - globals.set:
                              id: current_language
                              value: !lambda return x;
                          - lvgl.image.update:
                              id: flag_language_image
                              src: !lambda return id(flag_icon_mapping_image)[x];
                          - homeassistant.action:
                              action: display_tools.get_translations_esphome
                              data:
                                language: !lambda return id(flag_icon_mapping_name)[x];
                                category: entity_component
                                keys: '[
                                  "component.vacuum.entity_component._.state.cleaning",
                                  "component.vacuum.entity_component._.state.docked",
                                  "component.vacuum.entity_component._.state.error",
                                  "component.vacuum.entity_component._.state.idle",
                                  "component.vacuum.entity_component._.state.off",
                                  "component.vacuum.entity_component._.state.on",
                                  "component.vacuum.entity_component._.state.paused",
                                  "component.vacuum.entity_component._.state.returning",
                                  "component.cover.entity_component._.state.closed",
                                  "component.cover.entity_component._.state.closing",
                                  "component.cover.entity_component._.state.open",
                                  "component.cover.entity_component._.state.opening",
                                  "component.cover.entity_component._.state.stopped",
                                  "component.climate.entity_component._.state_attributes.hvac_action.state.cooling",
                                  "component.climate.entity_component._.state_attributes.hvac_action.state.defrosting",
                                  "component.climate.entity_component._.state_attributes.hvac_action.state.drying",
                                  "component.climate.entity_component._.state_attributes.hvac_action.state.fan",
                                  "component.climate.entity_component._.state_attributes.hvac_action.state.heating",
                                  "component.climate.entity_component._.state_attributes.hvac_action.state.idle",
                                  "component.climate.entity_component._.state_attributes.hvac_action.state.off",
                                  "component.weather.entity_component._.state.clear-night",
                                  "component.weather.entity_component._.state.cloudy",
                                  "component.weather.entity_component._.state.exceptional",
                                  "component.weather.entity_component._.state.fog",
                                  "component.weather.entity_component._.state.hail",
                                  "component.weather.entity_component._.state.lightning",
                                  "component.weather.entity_component._.state.lightning-rainy",
                                  "component.weather.entity_component._.state.partlycloudy",
                                  "component.weather.entity_component._.state.pouring",
                                  "component.weather.entity_component._.state.rainy",
                                  "component.weather.entity_component._.state.snowy",
                                  "component.weather.entity_component._.state.snowy-rainy",
                                  "component.weather.entity_component._.state.sunny",
                                  "component.weather.entity_component._.state.windy",
                                  "component.weather.entity_component._.state.windy-variant",
                                  "component.alarm_control_panel.entity_component._.state.armed",
                                  "component.alarm_control_panel.entity_component._.state.armed_away",
                                  "component.alarm_control_panel.entity_component._.state.armed_custom_bypass",
                                  "component.alarm_control_panel.entity_component._.state.armed_home",
                                  "component.alarm_control_panel.entity_component._.state.armed_night",
                                  "component.alarm_control_panel.entity_component._.state.armed_vacation",
                                  "component.alarm_control_panel.entity_component._.state.arming",
                                  "component.alarm_control_panel.entity_component._.state.disarmed",
                                  "component.alarm_control_panel.entity_component._.state.disarming",
                                  "component.alarm_control_panel.entity_component._.state.pending",
                                  "component.alarm_control_panel.entity_component._.state.triggered"]'

              # ── Theme ─────────────────────────────────────────────────────
              - obj:
                  id: theme_bg
                  x: 20
                  y: 110
                  width: 440
                  height: 80
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:
                    - label:
                        id: theme_label
                        x: 20
                        align: LEFT_MID
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_theme_label}"

                    - dropdown:
                        id: theme_dropdown
                        x: 240
                        width: 200
                        align: LEFT_MID
                        selected_index: !lambda return id(current_theme);
                        options:
                          - Cherry Blossom
                          - Dark Theme
                          - Espeon
                          - Ocean Theme
                          - Paris
                          - Patriotic
                        bg_opa: TRANSP
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        border_width: 0
                        text_font: nunito_20
                        text_color: color_misty_blue
                        dropdown_list:
                          bg_color: color_slate_blue_gray
                          shadow_opa: TRANSP
                          border_color: color_misty_blue
                          border_width: 2
                          text_font: nunito_20
                          text_color: color_misty_blue
                          text_line_space: 7
                          pad_all: 8
                          max_height: 280
                          selected:
                            checked:
                              bg_color: color_steel_blue
                              bg_opa: 20%
                              text_color: color_misty_blue
                            pressed:
                              bg_opa: TRANSP
                              text_color: color_misty_blue
                        indicator:
                          text_opa: TRANSP
                        on_value:
                          - globals.set:
                              id: current_theme
                              value: !lambda return x;
                          - script.execute: apply_theme

              # ── Backlight ─────────────────────────────────────────────────
              - obj:
                  id: backlight_bg
                  x: 20
                  y: 200
                  width: 440
                  height: 80
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:

                    - label:
                        id: display_backlight_label
                        x: 20
                        align: LEFT_MID
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_backlight_label}"

                    - slider:
                        id: display_backlight_brightness_slider
                        x: -20
                        radius: 10
                        bg_color: color_slate_blue_gray
                        align: RIGHT_MID
                        width: 260
                        height: 48
                        min_value: 35
                        max_value: 100
                        value: 100
                        indicator:
                          bg_color: color_misty_blue
                          radius: 10
                        knob:
                          bg_opa: TRANSP
                        on_release:
                          then:
                            - light.turn_on:
                                id: display_backlight
                                brightness: !lambda return int(x) / 100.0;

              # ── Sleep mode ────────────────────────────────────────────────
              - obj:
                  id: sleep_mode_bg
                  x: 20
                  y: 290
                  width: 440
                  height: 80
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:
                    - label:
                        id: display_timeout_label
                        x: 20
                        align: LEFT_MID
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_sleep_label}"

                    - dropdown:
                        id: display_timeout_dropdown
                        x: 220
                        width: 200
                        align: LEFT_MID
                        selected_index: !lambda return id(display_timeout);
                        options:
                          - 60
                          - 120
                          - 180
                          - 300
                          - 600
                        bg_opa: TRANSP
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        border_width: 0
                        text_font: nunito_20
                        text_color: color_misty_blue
                        dropdown_list:
                          align: CENTER
                          bg_color: color_slate_blue_gray
                          shadow_opa: TRANSP
                          border_color: color_misty_blue
                          border_width: 2
                          text_font: nunito_20
                          text_color: color_misty_blue
                          text_line_space: 10
                          pad_all: 8
                          max_height: 360
                          selected:
                            checked:
                              bg_color: color_steel_blue
                              bg_opa: 20%
                              text_color: color_misty_blue
                            pressed:
                              bg_opa: TRANSP
                              text_color: color_misty_blue
                        indicator:
                          text_opa: TRANSP
                        on_value:
                          then:
                            - number.set:
                                id: display_timeout_number
                                value: !lambda |-
                                  static const int backlight_time[] = {60, 120, 180, 300, 600};
                                  return backlight_time[x];
                            - globals.set:
                                id: display_timeout
                                value: !lambda return x;

              # ── Clock format ──────────────────────────────────────────────
              - obj:
                  id: clock_format_bg
                  x: 20
                  y: 380
                  width: 440
                  height: 80
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:
                    - label:
                        id: clock_format_label
                        x: 20
                        align: LEFT_MID
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_clock_label}"
                    - button:
                        id: clock_12h_btn
                        x: 230
                        width: 90
                        height: 50
                        align: LEFT_MID
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: clock_12h_label
                              align: CENTER
                              text_font: nunito_20
                              text_color: color_misty_blue
                              text: "${settings_clock_12h_label}"
                        on_press:
                          - globals.set:
                              id: time_format
                              value: '0'
                          - script.execute: time_update
                          - lvgl.button.update:
                              id: clock_12h_btn
                              bg_color: color_misty_blue
                          - lvgl.button.update:
                              id: clock_24h_btn
                              bg_color: color_steel_blue
                    - button:
                        id: clock_24h_btn
                        x: 330
                        width: 90
                        height: 50
                        align: LEFT_MID
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: clock_24h_label
                              align: CENTER
                              text_font: nunito_20
                              text_color: color_misty_blue
                              text: "${settings_clock_24h_label}"
                        on_press:
                          - globals.set:
                              id: time_format
                              value: '1'
                          - script.execute: time_update
                          - lvgl.button.update:
                              id: clock_12h_btn
                              bg_color: color_steel_blue
                          - lvgl.button.update:
                              id: clock_24h_btn
                              bg_color: color_misty_blue

              # ── Temperature unit ──────────────────────────────────────────
              - obj:
                  id: temp_unit_bg
                  x: 20
                  y: 470
                  width: 440
                  height: 80
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:
                    - label:
                        id: temp_unit_label
                        x: 20
                        align: LEFT_MID
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_temperature_label}"
                    - button:
                        id: temp_f_btn
                        x: 230
                        width: 90
                        height: 50
                        align: LEFT_MID
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: temp_f_label
                              align: CENTER
                              text_font: nunito_20
                              text_color: color_misty_blue
                              text: "°F"
                        on_press:
                          - globals.set:
                              id: temp_unit
                              value: '0'
                          - lvgl.button.update:
                              id: temp_f_btn
                              bg_color: color_misty_blue
                          - lvgl.button.update:
                              id: temp_c_btn
                              bg_color: color_steel_blue
                    - button:
                        id: temp_c_btn
                        x: 330
                        width: 90
                        height: 50
                        align: LEFT_MID
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: temp_c_label
                              align: CENTER
                              text_font: nunito_20
                              text_color: color_misty_blue
                              text: "°C"
                        on_press:
                          - globals.set:
                              id: temp_unit
                              value: '1'
                          - lvgl.button.update:
                              id: temp_f_btn
                              bg_color: color_steel_blue
                          - lvgl.button.update:
                              id: temp_c_btn
                              bg_color: color_misty_blue

              # ── Screensaver clock style ────────────────────────────────────
              - obj:
                  id: screensaver_style_bg
                  x: 20
                  y: 560
                  width: 440
                  height: 130
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:
                    - label:
                        id: screensaver_style_label
                        x: 20
                        y: 27
                        align: TOP_LEFT
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_screensaver_label}"
                    - button:
                        id: ss_digital_btn
                        x: 148
                        y: 15
                        width: 80
                        height: 50
                        align: TOP_LEFT
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: ss_digital_lbl
                              align: CENTER
                              text_font: nunito_18
                              text_color: color_misty_blue
                              text: "${settings_screensaver_digital_label}"
                        on_press:
                          - globals.set:
                              id: screensaver_style
                              value: '0'
                          - lvgl.button.update:
                              id: ss_digital_btn
                              bg_color: color_misty_blue
                          - lvgl.button.update:
                              id: ss_analog_btn
                              bg_color: color_steel_blue
                          - lvgl.button.update:
                              id: ss_none_btn
                              bg_color: color_steel_blue
                    - button:
                        id: ss_analog_btn
                        x: 236
                        y: 15
                        width: 80
                        height: 50
                        align: TOP_LEFT
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: ss_analog_lbl
                              align: CENTER
                              text_font: nunito_18
                              text_color: color_misty_blue
                              text: "${settings_flip_label}"
                        on_press:
                          - globals.set:
                              id: screensaver_style
                              value: '1'
                          - lvgl.button.update:
                              id: ss_digital_btn
                              bg_color: color_steel_blue
                          - lvgl.button.update:
                              id: ss_analog_btn
                              bg_color: color_misty_blue
                          - lvgl.button.update:
                              id: ss_none_btn
                              bg_color: color_steel_blue
                    - button:
                        id: ss_none_btn
                        x: 324
                        y: 15
                        width: 80
                        height: 50
                        align: TOP_LEFT
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: ss_none_lbl
                              align: CENTER
                              text_font: nunito_18
                              text_color: color_misty_blue
                              text: "${settings_screensaver_none_label}"
                        on_press:
                          - globals.set:
                              id: screensaver_style
                              value: '2'
                          - lvgl.button.update:
                              id: ss_digital_btn
                              bg_color: color_steel_blue
                          - lvgl.button.update:
                              id: ss_analog_btn
                              bg_color: color_steel_blue
                          - lvgl.button.update:
                              id: ss_none_btn
                              bg_color: color_misty_blue
                    - checkbox:
                        id: ss_events_checkbox
                        x: 148
                        y: 90
                        align: TOP_LEFT
                        text: "${settings_show_calendar_label}"
                        text_font: nunito_16
                        text_color: color_misty_blue
                        on_value:
                          - globals.set:
                              id: screensaver_show_calendar
                              value: !lambda "return x;"

              # ── Home clock style ───────────────────────────────────────────
              - obj:
                  id: home_clock_style_bg
                  x: 20
                  y: 700
                  width: 440
                  height: 80
                  align: TOP_LEFT
                  pad_all: 0
                  bg_color: color_steel_blue
                  bg_opa: 20%
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  radius: 10
                  widgets:
                    - label:
                        id: home_clock_style_lbl
                        x: 20
                        y: 27
                        align: TOP_LEFT
                        text_font: nunito_20
                        text_color: color_misty_blue
                        text: "${settings_home_clock_label}"
                    - button:
                        id: home_std_btn
                        x: 148
                        y: 15
                        width: 100
                        height: 50
                        align: TOP_LEFT
                        bg_color: color_misty_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: home_std_lbl
                              align: CENTER
                              text_font: nunito_18
                              text_color: color_misty_blue
                              text: "${settings_home_clock_standard_label}"
                        on_press:
                          - globals.set:
                              id: home_clock_style
                              value: '0'
                          - lvgl.button.update:
                              id: home_std_btn
                              bg_color: color_misty_blue
                          - lvgl.button.update:
                              id: home_flip_btn
                              bg_color: color_steel_blue
                          - lvgl.widget.show: display_time
                          - lvgl.widget.hide: home_flip_panels
                          - lvgl.widget.hide: home_flip_seam
                    - button:
                        id: home_flip_btn
                        x: 256
                        y: 15
                        width: 100
                        height: 50
                        align: TOP_LEFT
                        bg_color: color_steel_blue
                        shadow_opa: TRANSP
                        border_opa: TRANSP
                        radius: 10
                        widgets:
                          - label:
                              id: home_flip_lbl
                              align: CENTER
                              text_font: nunito_18
                              text_color: color_misty_blue
                              text: "${settings_flip_label}"
                        on_press:
                          - globals.set:
                              id: home_clock_style
                              value: '1'
                          - lvgl.button.update:
                              id: home_std_btn
                              bg_color: color_steel_blue
                          - lvgl.button.update:
                              id: home_flip_btn
                              bg_color: color_misty_blue
                          - lvgl.widget.hide: display_time
                          - lvgl.widget.show: home_flip_panels
                          - lvgl.widget.show: home_flip_seam
