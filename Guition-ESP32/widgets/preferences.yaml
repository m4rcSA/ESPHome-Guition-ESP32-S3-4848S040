# ── English label defaults ────────────────────────────────────────────────────
# These substitutions are baked in at compile time and provide the initial text
# shown on first render, before the boot translation fires.  They also serve as
# the English source strings — changing a value here updates both the compiled
# default AND the text shown when English (US) is selected.
#
# ── WHAT EACH GROUP CONTROLS ──────────────────────────────────────────────────
#
#   Page titles
#     The heading shown at the top of each page and in the language table
#     above (columns 0–6).  Change these to rename a section across all
#     languages at once, then update the matching cell in each language row.
#
#   Cover action buttons  (cover_open / stop / close_label)
#     The three command buttons on the cover detail page.  These are
#     compile-time only — add translations to a new script block if needed.
#
#   HVAC fan mode buttons  (hvac_fan_auto / on_label)
#     The Auto / On buttons on the HVAC detail page.
#
#   Weather forecast  (forecast_today / rain / refresh_label)
#     Labels on the 5-day forecast page.  forecast_rain_label and
#     forecast_refresh_label also have runtime translations (columns 7–8).
#
#   People page  (person_away_label)
#     Default status text shown on a person card before HA state arrives.
#
#   Alarm panel  (alarm_enter_code_label)
#     Prompt shown above the keypad when a code is required.
#
#   Loading screen  (loading_connecting / sync / connected_label)
#     The three status messages shown during the API connection sequence.
#
#   Settings headings  (settings_language / theme / … _label)
#     Section headings in the settings page.  Runtime translations for
#     these are at columns 9–24 in the language table above.
#
#   Settings buttons  (settings_clock_12h / 24h / screensaver_… / …)
#     Option button labels in the settings page.  Runtime translations
#     are at columns 14–24 in the language table above.

substitutions:

  # ── Page titles ───────────────────────────────────────────────────────────────
  alarm_panel_page_title:  "Alarm Panel"
  covers_page_title:       "Cover Controls"
  fans_page_title:         "Fan Controls"
  lights_page_title:       "Light Controls"
  shortcuts_page_title:    "Scene Controls"
  people_page_title:       "People"
  forecast_page_title:     "5-Day Forecast"

  # ── HVAC / Thermostat / Air Conditioner page titles ──────────────────────────
  # These substitutions control the page header shown for HVAC widgets.
  # The value here is used for ALL languages — the widget applies the same string
  # regardless of the selected language.  Change the value to rename the page.
  #
  #   hvac_page_title       → used by hvac_widget.yaml (combined HVAC)
  #   thermostat_page_title → used by thermostat_widget.yaml
  #   ac_page_title         → used by air_conditioner_widget.yaml
  #
  hvac_page_title:         "HVAC Controls"
  thermostat_page_title:   "Thermostat"
  ac_page_title:           "Air Conditioner"


  # ── Cover detail-page action buttons ─────────────────────────────────────────
  cover_open_label:  "Open"
  cover_stop_label:  "Stop"
  cover_close_label: "Close"


  # ── HVAC fan mode buttons ─────────────────────────────────────────────────────
  hvac_fan_auto_label: "Auto"
  hvac_fan_on_label:   "On"


  # ── Weather forecast page ─────────────────────────────────────────────────────
  forecast_today_label:   "Today"
  forecast_rain_label:    "Chance of Rain"
  forecast_refresh_label: "Refresh"


  # ── People page ───────────────────────────────────────────────────────────────
  person_away_label: "Away"


  # ── Alarm panel keypad ────────────────────────────────────────────────────────
  alarm_enter_code_label: "Enter Code"


  # ── Loading / boot screen ─────────────────────────────────────────────────────
  loading_connecting_label: "Connecting to API..."
  loading_sync_label:       "Synchronizing..."
  loading_connected_label:  "Home Assistant Connected!"


  # ── Settings page — section headings ─────────────────────────────────────────
  settings_language_label:    "Language"
  settings_theme_label:       "Theme"
  settings_backlight_label:   "Backlight"
  settings_sleep_label:       "Sleep Mode (sec)"
  settings_clock_label:       "Clock"
  settings_temperature_label: "Temperature"
  settings_screensaver_label: "Screensaver"
  settings_home_clock_label:  "Home Clock"


  # ── Settings page — button / option labels ────────────────────────────────────
  settings_clock_12h_label:           "12h"
  settings_clock_24h_label:           "24h"
  settings_screensaver_digital_label: "Digital"
  settings_flip_label:                "Flip"
  settings_screensaver_none_label:    "None"
  settings_home_clock_standard_label: "Standard"
  settings_show_calendar_label:       "Show Calendar Events"


# ── Language change hook ──────────────────────────────────────────────────────
# Fires whenever the Settings language dropdown changes.
select:
  - platform: lvgl
    widget: language_dropdown
    id: preferences_select_language
    on_value:
      then:
        - delay: 400ms
        - script.execute: apply_ui_translations


# ── Apply at boot ─────────────────────────────────────────────────────────────
esphome:
  on_boot:
    priority: -150
    then:
      - script.execute: apply_ui_translations