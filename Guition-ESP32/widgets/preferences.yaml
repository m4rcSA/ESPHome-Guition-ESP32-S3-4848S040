# preferences.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Central display-name preferences for all Guition ESP32-S3 display panels.
# Every human-readable label shown on screen is defined here so you can
# rename or translate any widget from one place without touching widget files.
#
# ── HOW TO USE ───────────────────────────────────────────────────────────────
# Add this file as the FIRST package in your main.yaml so its values take
# priority over the widget-file defaults:
#
#   packages:
#     preferences: !include widgets/preferences.yaml
#     # ... rest of your packages follow
#
# ── CUSTOMISING ENGLISH LABELS ───────────────────────────────────────────────
# Edit the `substitutions:` block at the bottom of this file.
# Those values are the compile-time defaults shown on first render and are
# also used as the English source strings by the translation engine.
#
# ── CUSTOMISING TRANSLATIONS ─────────────────────────────────────────────────
# Edit the matching row in the t[language][string] table inside the
# apply_ui_translations script below.  Each row is one language; each column
# is one on-screen label.  To only change one language, edit only that row —
# all other languages are unaffected.
#
# ── ADDING A NEW LANGUAGE ────────────────────────────────────────────────────
# 1. Copy any existing row in the t[][] table as a template and translate it.
# 2. Increment the first dimension: t[9][25] → t[10][25].
# 3. Add the language as a new option in the language_dropdown widget inside
#    settings_page.yaml — the row index must match the dropdown option order
#    (0-based, top-to-bottom).
# ─────────────────────────────────────────────────────────────────────────────


# ── Runtime translation engine ────────────────────────────────────────────────
# apply_ui_translations rewrites every always-present label to the selected
# language.  Called automatically at boot and on every language-dropdown change.
#
# ── LANGUAGE INDEX (row number in the table) ─────────────────────────────────
#   0 = de    German
#   1 = es    Spanish
#   2 = fr    French
#   3 = en-GB English (UK)
#   4 = it    Italian
#   5 = pt    Portuguese
#   6 = ru    Russian
#   7 = en    English (US) ← default if index is out of range
#   8 = pl    Polish
#   9 = ca    Catalan
#
# ── STRING INDEX (column number in the table) ────────────────────────────────
#   Each column maps to one on-screen label.  To change a specific label for a
#   specific language, find the language row and edit the value at that column.
#
#    0  alarm_panel_header         Alarm panel page title
#    1  covers_panel_header        Covers page title
#    2  fans_panel_header          Fans page title
#    3  lights_panel_header        Lights page title
#    4  shortcuts_panel_header     Scenes / shortcuts page title
#    5  people_page_title_lbl      People page title
#    6  forecast_title_lbl         5-Day forecast page title
#    7  forecast_rain_lbl          Rain probability label on forecast page
#    8  forecast_refresh_lbl       Refresh button on forecast page
#    9  language_label             Settings: "Language" section heading
#   10  theme_label                Settings: "Theme" section heading
#   11  display_backlight_label    Settings: "Backlight" section heading
#   12  display_timeout_label      Settings: "Sleep Mode" section heading
#   13  clock_format_label         Settings: "Clock" section heading
#   14  clock_12h_label            Settings: 12-hour clock button
#   15  clock_24h_label            Settings: 24-hour clock button
#   16  temp_unit_label            Settings: "Temperature" section heading
#   17  screensaver_style_label    Settings: "Screensaver" section heading
#   18  ss_digital_lbl             Settings: screensaver "Digital" option
#   19  ss_analog_lbl              Settings: screensaver "Flip" option
#   20  ss_none_lbl                Settings: screensaver "None" option
#   21  ss_events_checkbox         Settings: "Show Calendar Events" checkbox
#   22  home_clock_style_lbl       Settings: "Home Clock" section heading
#   23  home_std_lbl               Settings: home clock "Standard" option
#   24  home_flip_lbl              Settings: home clock "Flip" option

