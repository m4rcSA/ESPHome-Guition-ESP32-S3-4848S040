# https://esphome.io/components/climate/thermostat.html

substitutions:

  thermostat_name:    "thermostat"
  temperature_sensor: "temperature_sensor"

  hvac_icon:          "\U0000e925"    # thermostat nav button icon
  heating_icon:       "\U0000e936"
  temperature_icon:   "\U0000e939"
  pm_home_icon:       "\U000F0826"
  pm_away_icon:       "\U000F1A46"

  # Page ID — override to "thermostat_page" when using the thermostat+AC combo
  # (see Section 4 of main.yaml).  Leave as "hvac_page" for single-unit use.
  thermostat_page_id: "hvac_page"

  thermostat_page_title: "Thermostat"

sensor:

  # Thermostat target temperature
  - platform: homeassistant
    id: thermostat_sensor_target_temp
    entity_id: "${thermostat_entity}"
    attribute: temperature
    on_value: 
      then:
        - lvgl.arc.update:
            id: thermostat_arc_main
            value: !lambda return x;

        - lvgl.label.update:
            id: thermostat_target_temperature_whole
            text: !lambda |-
              static char buf[10];
              int whole_part = static_cast<int>(id(thermostat_sensor_target_temp).state);
              snprintf(buf, 10, "%d", whole_part);
              return buf;

        - lvgl.label.update:
            id: thermostat_target_temperature_fraction
            text: !lambda |-
              static char buf[10];
              int whole_part = static_cast<int>(id(thermostat_sensor_target_temp).state);
              int fractional_part = static_cast<int>((id(thermostat_sensor_target_temp).state - whole_part) * 10);
              snprintf(buf, 10, ".%01d", fractional_part);
              return buf;

  # Thermostat current temperature
  - platform: homeassistant
    id: thermostat_sensor_current_temp
    entity_id: "${thermostat_entity}"
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: thermostat_target_temperature_value
          text: !lambda |-
            char buf[8]; 
            sprintf(buf, "%.1f", x); 
            return std::string(buf);

      - lvgl.arc.update:
          id: thermostat_arc_current_temp
          value: !lambda return x;


text_sensor:

  # Thermostat name
  - platform: homeassistant
    id: thermostat_sensor_name
    entity_id: "${thermostat_entity}"
    attribute: friendly_name
    on_value:
      - lvgl.label.update:
          id: thermostat_name_label
          text: !lambda return x;

  # Thermostat preset mode
  - platform: homeassistant
    id: thermostat_sensor_preset_mode
    entity_id: "${thermostat_entity}"
    attribute: preset_mode
    on_value:
      - if:
          condition:
            lambda: 'return id(thermostat_sensor_preset_mode).state == "home";'
          then:
            - lvgl.obj.update:
                id: thermostat_preset_mode_bg
                bg_color: color_green
            - lvgl.label.update:
                id: thermostat_preset_mode_icon
                text: "${pm_home_icon}"
                text_color: color_green
          else:
            - lvgl.obj.update:
                id: thermostat_preset_mode_bg
                bg_color: color_red
            - lvgl.label.update:
                id: thermostat_preset_mode_icon
                text: "${pm_away_icon}"
                text_color: color_red


  # Thermostat hvac mode
  - platform: homeassistant
    id: thermostat_sensor_hvac_mode
    entity_id: "${thermostat_entity}"
    attribute: hvac_action
    on_value:
      - script.execute:
          id: thermostat_get_and_set_translated_state
          state_str: !lambda 'return id(thermostat_sensor_hvac_mode).state;'
      - if:
          condition:
            lambda: 'return id(thermostat_sensor_hvac_mode).state == "heating";'
          then:
            - lvgl.label.update:
                id: thermostat_state_label
                text_color: color_deep_orange
          else:
            - lvgl.label.update:
                id: thermostat_state_label
                text_color: color_steel_blue

  # Thermostat state
  - platform: homeassistant
    id: thermostat_sensor_state
    entity_id: "${thermostat_entity}"
    on_value:
      - if:
          condition:
            lambda: 'return id(thermostat_sensor_state).state == "off";'
          then:
            - lvgl.obj.update:
                id: thermostat_power_bg
                bg_color: color_misty_blue
            - lvgl.label.update:
                id: thermostat_power_icon
                text_color: color_misty_blue
          else:
            - lvgl.obj.update:
                id: thermostat_power_bg
                bg_color: color_deep_orange
            - lvgl.label.update:
                id: thermostat_power_icon
                text_color: color_deep_orange
lvgl:

  gradients:
    - id: thermostat_temp_gradient
      direction: ver
      dither: none
      stops:
        - color: 0xFF0000
          position: 0
        - color: 0xFF3300
          position: 32
        - color: 0xFF6600
          position: 64
        - color: 0xFF8000
          position: 96
        - color: 0xFF9900
          position: 128
        - color: 0xFFB300
          position: 160
        - color: 0xFFCC00
          position: 192
        - color: 0xFFE600
          position: 224
        - color: 0xFFFF00
          position: 255

  pages:
    - id: ${thermostat_page_id}
      bg_color: color_slate_blue_gray
      widgets:
        # ── Page title ──────────────────────────────────────────────────────
        - label:
            id: thermostat_header
            align: TOP_MID
            y: 20
            text_font: nunito_20
            text_color: color_misty_blue
            text: "${thermostat_page_title}"

        # ── Divider under title ──────────────────────────────────────────────
        - obj:
            align: TOP_MID
            y: 48
            width: 440
            height: 1
            pad_all: 0
            bg_color: color_misty_blue
            bg_opa: 20%
            border_opa: TRANSP
            shadow_opa: TRANSP
            radius: 0

        # State
        - obj:
            id: thermostat_state
            x: 20
            y: 58
            width: 400
            height: 60
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - label:
                  id: thermostat_state_label
                  x: 20
                  align: LEFT_MID
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: " "

        # Preset Mode and Power Toggle
        - obj:
            id: thermostat_controls
            x: 100
            y: 120
            width: 260
            height: 248
            align: TOP_LEFT
            pad_all: 0
            bg_color: color_steel_blue
            bg_opa: 20%
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:
              - obj:
                  id: thermostat_preset_mode_bg
                  x: 35
                  y: -60
                  align: left_mid
                  width: 70
                  height: 70
                  radius: 35
                  pad_all: 0
                  bg_color: color_green
                  bg_opa: 60%
                  shadow_opa: transp
                  border_opa: transp
                  border_width: 0
                  widgets:
                    - label:
                        id: thermostat_preset_mode_icon
                        align: center
                        text_font: mdi_icons_52
                        text_color: color_green
                        text: "${pm_home_icon}"
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(thermostat_sensor_preset_mode).state == "home";'
                        then:
                          - homeassistant.action:
                              action: climate.set_preset_mode
                              data:
                                entity_id: "${thermostat_entity}"
                                preset_mode: away
                        else:
                          - homeassistant.action:
                              action: climate.set_preset_mode
                              data:
                                entity_id: "${thermostat_entity}"
                                preset_mode: home

              - obj:
                  id: thermostat_power_bg
                  x: 35
                  y: 60
                  align: left_mid
                  width: 70
                  height: 70
                  radius: 35
                  pad_all: 0
                  bg_color: color_deep_orange
                  bg_opa: 30%
                  shadow_opa: transp
                  border_opa: transp
                  border_width: 0
                  widgets:
                    - label:
                        id: thermostat_power_icon
                        align: center
                        text_font: icons_38
                        text_color: color_deep_orange
                        text: "${power_icon}"
                  on_click:
                    - homeassistant.action:
                        action: climate.toggle
                        data:
                          entity_id: "${thermostat_entity}"

        # Temperature controls
        - obj:
            x: 5
            y: -60
            width: 90
            height: 90
            align: left_mid
            pad_all: 0
            bg_opa: transp
            shadow_opa: transp
            border_opa: transp
            widgets:
              - obj:
                  width: 70
                  height: 70
                  align: center
                  clickable: true
                  radius: 50
                  pad_all: 0
                  bg_opa: transp
                  border_opa: transp
                  border_width: 0
                  shadow_width: 8
                  shadow_spread: 2
                  shadow_color: color_black
                  pressed:
                    bg_color: 0x3A3A4C
                    shadow_width: 5
                  on_press:
                      then:
                        - lambda: |-
                            auto temp = id(thermostat_sensor_target_temp).state + 0.5;
                            id(thermostat_sensor_target_temp).publish_state(temp);
                        - homeassistant.service:
                            service: climate.set_temperature
                            data:
                              entity_id: "${thermostat_entity}"
                              temperature: !lambda 'return id(thermostat_sensor_target_temp).state;'
              - obj:
                  width: 60
                  height: 60
                  align: center
                  clickable: false
                  radius: 45
                  pad_all: 0
                  bg_opa: transp 
                  border_opa: transp
                  shadow_width: 4
                  shadow_color: 0xFFFFFF
                  shadow_ofs_x: -4
                  shadow_ofs_y: -2
                  shadow_opa: 30%

              - obj:
                  width: 65
                  height: 65
                  pad_all: 0
                  align: center
                  clickable: false
                  radius: 50
                  border_opa: transp
                  bg_color: color_slate_blue_gray
                  widgets:
                    - label:
                        y: -2
                        align: center
                        text_font: nunito_48
                        text_color: color_misty_blue
                        text: "+"

        - obj:
            x: 5
            y: 60
            width: 90
            height: 90
            align: left_mid
            pad_all: 0
            bg_opa: transp
            shadow_opa: transp
            border_opa: transp
            widgets:
              - obj:
                  width: 70
                  height: 70
                  align: center
                  clickable: true
                  radius: 50
                  pad_all: 0
                  bg_opa: transp
                  border_opa: transp
                  border_width: 0
                  shadow_width: 8
                  shadow_spread: 2
                  shadow_color: color_black
                  pressed:
                    bg_color: 0x3A3A4C
                    shadow_width: 5
                  on_press:
                      then:
                        - lambda: |-
                            auto temp = id(thermostat_sensor_target_temp).state - 0.5;
                            id(thermostat_sensor_target_temp).publish_state(temp);
                        - homeassistant.service:
                            service: climate.set_temperature
                            data:
                              entity_id: "${thermostat_entity}"
                              temperature: !lambda 'return id(thermostat_sensor_target_temp).state;'
              - obj:
                  width: 60
                  height: 60
                  align: center
                  clickable: false
                  radius: 45
                  pad_all: 0
                  bg_opa: transp 
                  border_opa: transp
                  shadow_width: 4
                  shadow_color: 0xFFFFFF
                  shadow_ofs_x: -4
                  shadow_ofs_y: -2
                  shadow_opa: 30%

              - obj:
                  width: 65
                  height: 65
                  pad_all: 0
                  align: center
                  clickable: false
                  radius: 50
                  border_opa: transp
                  bg_color: color_slate_blue_gray
                  widgets:
                    - label:
                        y: -2
                        align: CENTER
                        text_font: nunito_48
                        text_color: color_misty_blue
                        text: "-"


        # Hidden label – keeps sensor update target valid
        - label:
            id: thermostat_name_label
            hidden: true
            text: ""
            text_font: nunito_16

        # main — constrained to content area (y=49..369, above nav bar)
        - obj:
            id: thermostat_bg_main
            width: 250
            height: 320
            y: 49
            align: TOP_RIGHT
            pad_all: 0
            bg_opa: TRANSP
            scrollable: false
            border_opa: TRANSP
            border_width: 0
            shadow_opa: TRANSP
            radius: 10
            widgets:

              - obj:
                  id: thermostat_bg_placeholder
                  radius: 160
                  x: 155
                  width: 320
                  height: 320
                  align: RIGHT_MID
                  bg_color: color_slate_blue_gray
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP

              - obj:
                  id: thermostat_temp_arc_bg
                  radius: 155
                  x: 150
                  width: 310
                  height: 310
                  align: RIGHT_MID
                  bg_grad: thermostat_temp_gradient
                  bg_grad_dir: ver
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP

              - meter:
                  id: thermostat_meter
                  x: 130
                  height: 270
                  width: 270
                  border_width: 0
                  bg_color: color_slate_blue_gray
                  align: RIGHT_MID
                  text_color: color_steel_blue
                  scales:
                    - range_from: 50
                      range_to: 90
                      angle_range: 160
                      rotation: 100.0
                      ticks:
                        width: 1
                        count: 21
                        length: 10
                        color: color_white
                        major:
                          stride: 5
                          width: 5
                          length: 15
                          color: color_white
                          label_gap: 15
                      indicators:
                        - tick_style:
                            start_value: 10
                            end_value: 30
                            color_start: color_yellow
                            color_end: color_red
                            width: 1

              - arc:
                  id: thermostat_arc_main
                  align: RIGHT_MID
                  arc_width: 40
                  x: 150
                  width: 310
                  height: 310
                  min_value: 50
                  max_value: 90
                  adjustable: true
                  adv_hittest: true
                  rotation: 90.0
                  start_angle: 10
                  end_angle: 170
                  arc_opa: TRANSP
                  indicator:
                    arc_opa: TRANSP
                    arc_width: 40
                  knob:
                    border_color: color_misty_blue
                    border_width: 7
                    bg_color: color_dark_gray
                    bg_opa: 80%
                  on_release:
                    - homeassistant.service:
                        service: climate.turn_on
                        data:
                          entity_id: "${thermostat_entity}"

                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: "${thermostat_entity}"
                          temperature: !lambda return x;

              - arc:
                  id: thermostat_arc_current_temp
                  clickable: false
                  align: RIGHT_MID
                  arc_width: 10
                  x: 145
                  width: 300
                  height: 300
                  min_value: 50
                  max_value: 90
                  adjustable: true
                  adv_hittest: true
                  rotation: 90.0
                  start_angle: 10
                  end_angle: 170
                  arc_opa: TRANSP
                  indicator:
                    arc_opa: TRANSP
                  knob:
                    bg_color: color_dark_gray
                    border_width: 0
                    bg_opa: 80%

              - obj:
                  width: 130
                  height: 95
                  align: RIGHT_MID
                  bg_color: color_slate_blue_gray
                  pad_all: 0
                  border_opa: TRANSP
                  border_width: 0
                  shadow_opa: TRANSP
                  widgets:

                    - label:
                        id: thermostat_target_temperature_whole
                        x: -32
                        y: 0
                        align: RIGHT_MID
                        text_font: nunito_64
                        text_color: color_steel_blue
                        text: " "

                    - label:
                        id: thermostat_target_temperature_fraction
                        x: -7
                        y: 10
                        align: RIGHT_MID
                        text_font: nunito_30
                        text_color: color_steel_blue
                        text: " "

                    - label:
                        id: thermostat_target_temperature_measurement
                        x: -8
                        y: -14
                        align: RIGHT_MID
                        text_font: nunito_20
                        text_color: color_steel_blue
                        text: "°F"

              - label:
                  id: thermostat_state_icon
                  x: -10
                  y: -90
                  align: RIGHT_MID
                  text_font: icons_48
                  text_color: color_steel_blue
                  text: "${heating_icon}"

              - label:
                  id: thermostat_target_temperature_icon
                  x: -70
                  y: 80
                  align: RIGHT_MID
                  text_font: icons_28
                  text_color: color_steel_blue
                  text: "${temperature_icon}"

              - label:
                  id: thermostat_target_temperature_value
                  x: -10
                  y: 80
                  align: RIGHT_MID
                  text_font: nunito_30
                  text_color: color_steel_blue
                  text: " "


script:
  - id: thermostat_get_and_set_translated_state
    parameters:
      state_str: string
    then:   
      - lambda: |-
          std::string state = state_str;
          
          auto it = id(climate_translations).find(state);
          std::string translated_state = (it != id(climate_translations).end()) ? it->second : state;
          
          lv_label_set_text(id(thermostat_state_label), translated_state.c_str());

  - id: apply_thermostat_ui_labels
    then:
      - lambda: |-
          // 0=de 1=es 2=fr 3=en-GB 4=it 5=pt 6=ru 7=en 8=pl
          static const char* const t[9] = {
            "${thermostat_page_title}",  // de
            "${thermostat_page_title}",  // es
            "${thermostat_page_title}",  // fr
            "${thermostat_page_title}",  // en-GB
            "${thermostat_page_title}",  // it
            "${thermostat_page_title}",  // pt
            "${thermostat_page_title}",  // ru
            "${thermostat_page_title}",  // en
            "${thermostat_page_title}",  // pl
          };
          int l = id(current_language);
          if (l < 0 || l > 8) l = 7;
          lv_label_set_text(id(thermostat_header), t[l]);

select:
  - platform: lvgl
    widget: language_dropdown
    id: thermostat_select_language
    on_value:
      then:
        - delay: 300ms
        - script.execute:
            id: thermostat_get_and_set_translated_state
            state_str: !lambda 'return id(thermostat_sensor_hvac_mode).state;'
        - script.execute: apply_thermostat_ui_labels


esphome:
  on_boot:
    priority: -100
    then:
      - script.execute: apply_thermostat_ui_labels
      - if:
          condition:
            lambda: 'return id(thermostat_sensor_hvac_mode).has_state();'
          then:
            - script.execute:
                id: thermostat_get_and_set_translated_state
                state_str: !lambda 'return id(thermostat_sensor_hvac_mode).state;'

api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return id(thermostat_sensor_hvac_mode).has_state();'
        then:
          - script.execute:
              id: thermostat_get_and_set_translated_state
              state_str: !lambda 'return id(thermostat_sensor_hvac_mode).state;'